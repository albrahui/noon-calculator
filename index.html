<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة رسوم نون السعودية الفورية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>

<body class="bg-light text-dark">
    <div class="container my-5" style="max-width: 700px;">
        <div class="card rounded-0 border-secondary mb-4">
            <div class="card-header bg-white border-bottom border-secondary py-3 d-flex align-items-center justify-content-between position-relative">
                <h4 class="mb-0 text-uppercase fw-bold text-center flex-grow-1">اداة تسعيرة نون</h4>
                <div class="text-start">
                    <h5 class="mb-0"><a href="https://albrahui.github.io/noon-calculator/details.html" class="text-decoration-none bg-success text-white p-1 fw-bold">
                       دليل الاستخدام للموظف
                    </a></h5>
                </div>
            </div>
            <div class="card-body p-4">
                <form id="noonCalcForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">فئة المنتج</label>
                            <select class="form-select rounded-0 border-secondary" id="category" required>
                                <option value="0.05" selected>العناية بالسيارات سوائل المحرك البواجي 5%</option>
                                <option value="0.07">العطور والبخور 7%</option>
                                <option value="0.10">حقائب السفر 10%</option>
                                <option value="0.13">جميع أنواع الحقائب الأخرى 13%</option>
                                <option value="0.14">الملابس والقمصان 14%</option>
                                <option value="0.07">إكسسوارات الملابس كابات محافظ 7%</option>
                                <option value="0.07">ساعات اليد 7%</option>
                                <option value="0.05">مجسمات السيارات والألعاب 5%</option>
                                <option value="0.03">أنظمة الصوت إلكترونيات السيارات 3%</option>
                                <option value="0.07">اخرى 7%</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">سعر المحل التكلفة</label>
                            <input type="number" class="form-control rounded-0 border-secondary" id="basePrice" value="100" step="0.01">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">الوزن الفعلي كيلو</label>
                            <input type="number" class="form-control rounded-0 border-secondary" id="weight" value="0.5" step="0.01">
                        </div>

                        <div class="col-12">
                            <hr class="text-secondary my-1">
                            <label class="form-label fw-bold text-muted d-block mb-2">أبعاد الشحنة سم اختياري</label>
                        </div>

                        <div class="col-4">
                            <input type="number" class="form-control rounded-0 border-secondary" id="length" placeholder="الطول">
                        </div>
                        <div class="col-4">
                            <input type="number" class="form-control rounded-0 border-secondary" id="width" placeholder="العرض">
                        </div>
                        <div class="col-4">
                            <input type="number" class="form-control rounded-0 border-secondary" id="height" placeholder="الارتفاع">
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card rounded-0 border-secondary" id="resultsCard">
            <div class="card-header bg-dark text-white border-0 py-3">
                <h5 class="mb-0 text-uppercase fw-bold text-center">قيم التسعير المقترحة لمنصة نون</h5>
            </div>
            <div class="card-body p-4">
                <table class="table table-bordered rounded-0 mb-0 align-middle">
                    <tbody>

                        <tr>
                            <td>الوزن المحتسب للشحن</td>
                            <td class="text-start" id="outWeight">0.00 كيلو</td>
                        </tr>
        <tr>
                            <td>---</td>

                        </tr>
                        <tr>
                            <td>عمولة المنصة (رسوم)</td>
                            <td class="text-start text-danger" id="outComm">0.00 ريال</td>
                        </tr>
                        <tr>
                            <td>
                                الشحن والاستلام
                                ( رسوم )

                            </td>
                            <td class="text-start text-danger" id="outCourier">0.00 ريال</td>
                        </tr>
                        <tr>
                            <td>ضريبة القيمة المضافة 15% على الرسوم</td>
                            <td class="text-start text-danger" id="outVat">0.00 ريال</td>
                        </tr>

                        <tr>
                            <td>---</td>

                        </tr>

                        <tr>
                            <td class="fw-bold bg-light fs-5">سعر البيع المقترح على نون</td>
                            <td class="text-start fw-bold text-primary fs-4" id="outSellingPrice">0.00 ريال</td>
                        </tr>
                        <tr class="table-success border-top border-dark">
                            <td class="fw-bold">سعر المحل الصافي</td>
                            <td class="text-start fw-bold text-success fs-5" id="outPayout">0.00 ريال</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card rounded-0 border-secondary mt-4 shadow-sm">
            <div class="card-body p-3" id="explZone">
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('noonCalcForm');

        function calculateLive() {
            let basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
            let commRate = parseFloat(document.getElementById('category').value) || 0;
            let physicalWeight = parseFloat(document.getElementById('weight').value) || 0;

            let l = parseFloat(document.getElementById('length').value) || 0;
            let w = parseFloat(document.getElementById('width').value) || 0;
            let h = parseFloat(document.getElementById('height').value) || 0;

            let volumetricWeight = (l * w * h) / 5000;
            let chargeableWeight = Math.max(physicalWeight, volumetricWeight);

            let courierFee = 0;
            if (chargeableWeight <= 0.25) {
                courierFee = 19.00;
            } else if (chargeableWeight <= 0.50) {
                courierFee = 19.50;
            } else if (chargeableWeight <= 1.00) {
                courierFee = 20.50;
            } else if (chargeableWeight <= 1.50) {
                courierFee = 21.50;
            } else if (chargeableWeight <= 2.00) {
                courierFee = 22.50;
            } else if (chargeableWeight <= 3.00) {
                courierFee = 29.00;
            } else {
                courierFee = 29.00 + Math.ceil(chargeableWeight - 3.00);
            }

            let computedSellingPrice = (basePrice + (courierFee * 1.15)) / (1 - (commRate * 1.15));

            if (computedSellingPrice < 0 || isNaN(computedSellingPrice)) {
                computedSellingPrice = 0;
            }

            let commissionFee = computedSellingPrice * commRate;
            let vatOnFees = (commissionFee + courierFee) * 0.15;
            let netPayout = computedSellingPrice - (commissionFee + courierFee + vatOnFees);

             let explZone = document.getElementById('explZone');


            explZone.innerHTML = '<h6 class="fw-bold text-primary">توضيح نظام خدمات نون اللوجستية الإلزامي:</h6>' +
                '<p class="small text-muted mb-2">تعتمد منصة نون على فصل الخدمات كلياً لتغطية تكاليف التشغيل:</p>' +
                '<ul class="small text-muted mb-3">' +
                '<li><strong>العميل يدفع:</strong> مقابل خدمة التوصيل المنزلي (من مستودع نون &larr; إلى باب العميل)، وقد تظهر له مجانية كعرض ترويجي أو بسبب اشتراك Noon One لجذبه للشراء.</li>' +
                '<li><strong>نحن ندفع كبائعين:</strong> رسوم الاستلام والمعالجة الثابتة <strong>(DirectShip Fee)</strong> وقدرها <strong>' + courierFee.toFixed(2) + ' ريال</strong>. وهي تكلفة حضور مندوب نون، استلام القطعة من موقعنا، وفحصها وإدخالها للنظام (من موقعنا &larr; إلى مستودع نون).</li>' +
                '</ul>' +
                '<p class="small text-muted mb-0">لذا، حتى لو ظهر المنتج للعميل بشعار "تشمل الشحن المجاني"، فإن نون خصمها ثابت وإجباري من حساب البائع لتغطية الحركة الأولى للبضاعة. صافي ربح المحل المستلم هو <strong>' + netPayout.toFixed(2) + ' ريال</strong></p>';

            document.getElementById('outWeight').innerText = chargeableWeight.toFixed(2) + ' كيلو';
            document.getElementById('outSellingPrice').innerText = computedSellingPrice.toFixed(2) + ' ريال';
            document.getElementById('outComm').innerText = '-' + commissionFee.toFixed(2) + ' ريال';
            document.getElementById('outCourier').innerText = '-' + courierFee.toFixed(2) + ' ريال';
            document.getElementById('outVat').innerText = '-' + vatOnFees.toFixed(2) + ' ريال';
            document.getElementById('outPayout').innerText = netPayout.toFixed(2) + ' ريال';
        }

        form.addEventListener('input', calculateLive);
        window.addEventListener('DOMContentLoaded', calculateLive);
    </script>
</body>
</html>
